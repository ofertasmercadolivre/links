<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Recomendados 2026 | Curadoria Técnica</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #141414;
            --card-bg: #1f1f1f;
            --ml-yellow: #ffe600;
            --text-color: #ffffff;
            --accent-red: #e50914;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding-bottom: 50px;
        }

        header {
            width: 100%;
            padding: 30px 0 10px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .back-link {
            color: var(--ml-yellow);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: white;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: #aaa;
            margin: 5px 0 25px;
        }

        /* Card de Ranking */
        .btn-rank {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px;
            margin-bottom: 12px;
            text-decoration: none;
            color: white;
            background-color: var(--card-bg);
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95rem;
            border-left: 4px solid var(--ml-yellow);
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-rank:active {
            transform: scale(0.98);
            background-color: #2a2a2a;
        }

        .status-badge {
            font-size: 0.65rem;
            background-color: var(--accent-red);
            padding: 2px 6px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Voltar ao Início</a>
        <h1>Ranking Top 5</h1>
        <p class="subtitle">A elite por categoria (Atualizado 2026)</p>
    </header>

    <div class="container">
        
        <a href="#" target="_blank" class="btn-rank">
            <span>🛠️ Top 5 Parafusadeiras 2026</span>
            <span class="status-badge">Ver Lista ML</span>
        </a>

        <footer>
            © 2026 Alexandre Moura | Curadoria Técnica<br>
            Novas categorias serão adicionadas após validação técnica.
        </footer>
    </div>

</body>
</html>
