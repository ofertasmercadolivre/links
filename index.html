<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curadoria de Ofertas BR</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: auto; }
        .logo-box { background-color: #ffe600; width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; margin-bottom: 5px; font-weight: 800; color: #1a1a1a; }
        p { margin-bottom: 25px; color: #666; font-size: 0.9rem; }
        
        .btn { display: block; padding: 16px; margin-bottom: 12px; text-decoration: none; color: white; font-weight: bold; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.85rem; }
        .btn:active { transform: scale(0.96); }

        /* Cores dos Nichos (Padrão Mercado Livre/Elegante) */
        .auto { background-color: #1a1a1a; }      /* Preto */
        .ferramentas { background-color: #2c3e50; } /* Cinza Azulado */
        .cozinha { background-color: #f39c12; }   /* Laranja */
        .tech { background-color: #2980b9; }      /* Azul */
        .games { background-color: #8e44ad; }     /* Roxo */
        .smart { background-color: #27ae60; }     /* Verde */
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">📦</div>
        <h1>CURADORIA DE OFERTAS BR</h1>
        <p>As melhores ofertas do Mercado Livre 🛒</p>
        
        <a href="#" class="btn auto">🚗 Acessórios Automotivos</a>
        <a href="#" class="btn ferramentas">🛠️ Ferramentas & DIY</a>
        <a href="#" class="btn cozinha">🥘 Cozinha Criativa</a>
        <a href="#" class="btn tech">💻 Tecnologia & Setup</a>
        <a href="#" class="btn games">🎮 Mundo Gamer</a>
        <a href="#" class="btn smart">🏠 Casa Inteligente</a>
    </div>
</body>
</html>
