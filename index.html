<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curadoria Ofertas BR</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: auto; }
        .logo-box { background-color: #ffe600; width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; margin-bottom: 5px; font-weight: 800; color: #1a1a1a; }
        p { margin-bottom: 25px; color: #666; font-size: 0.9rem; }
        
        .section-title { font-size: 1rem; font-weight: bold; margin: 20px 0 10px; text-align: left; border-left: 4px solid #1a1a1a; padding-left: 10px; display: flex; align-items: center; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn { flex: 1; padding: 14px 5px; text-decoration: none; color: white; font-weight: bold; border-radius: 10px; transition: 0.2s; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        
        /* Cores das Plataformas */
        .ml { background-color: #3483fa; } /* Azul Mercado Livre */
        .shopee { background-color: #ee4d2d; } /* Laranja Shopee */
        
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">📦</div>
        <h1>CURADORIA OFERTAS BR</h1>
        <p>Compare e economize nos melhores achados 🇧🇷</p>

        <div class="section-title">🚗 AUTOMOTIVO</div>
        <div class="btn-group">
            <a href="#" class="btn ml">Mercado Livre</a>
            <a href="#" class="btn shopee">Shopee</a>
        </div>

        <div class="section-title">🛠️ FERRAMENTAS</div>
        <div class="btn-group">
            <a href="#" class="btn ml">Mercado Livre</a>
            <a href="#" class="btn shopee">Shopee</a>
        </div>

        <div class="section-title">🥘 COZINHA CRIATIVA</div>
        <div class="btn-group">
            <a href="#" class="btn ml">Mercado Livre</a>
            <a href="#" class="btn shopee">Shopee</a>
        </div>

        <div class="section-title">🎮 MUNDO GAMER</div>
        <div class="btn-group">
            <a href="#" class="btn ml">Mercado Livre</a>
            <a href="#" class="btn shopee">Shopee</a>
        </div>

        <div class="section-title">💻 TECH & SETUP</div>
        <div class="btn-group">
            <a href="#" class="btn ml">Mercado Livre</a>
            <a href="#" class="btn shopee">Shopee</a>
        </div>
    </div>
</body>
</html>
