<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Achadinhos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: auto; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { margin-bottom: 25px; color: #666; }
        
        .btn { display: block; padding: 16px; margin-bottom: 12px; text-decoration: none; color: white; font-weight: bold; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.98); }

        /* Suas Cores por Nicho */
        .auto { background-color: #1a1a1a; }      /* Automotivo - Preto */
        .cozinha { background-color: #f39c12; }   /* Cozinha - Laranja */
        .tech { background-color: #2980b9; }      /* Tech - Azul */
        .beleza { background-color: #e84393; }    /* Beleza - Rosa */
        .smart { background-color: #6c5ce7; }     /* Smart Home - Roxo */
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Meus Achadinhos</h1>
        <p>As melhores ofertas do Mercado Livre</p>
        
        <a href="#" class="btn auto">🚗 ACESSÓRIOS AUTOMOTIVOS</a>
        <a href="#" class="btn cozinha">🥘 COZINHA CRIATIVA</a>
        <a href="#" class="btn tech">💻 TECNOLOGIA & SETUP</a>
        <a href="#" class="btn beleza">🧴 BELEZA & CUIDADO</a>
        <a href="#" class="btn smart">🏠 CASA INTELIGENTE</a>
    </div>
</body>
</html>
